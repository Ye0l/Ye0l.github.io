<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FF14 CC Character Details</title>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css?v=20260510-detail-view-link">
  </head>
  <body class="details-page">
  <div class="page">
    <header class="topbar">
      <div class="topbar-actions">
        <button id="themeToggle" class="icon-btn" type="button" aria-label="테마 변경" title="테마 변경">
          <span id="themeIcon" aria-hidden="true">☾</span>
        </button>
      </div>
    </header>

    <main class="details-layout">
      <header class="details-hero">
        <div class="details-hero-info">
          <span class="eyebrow">FFXIV KR PvP Archive</span>
          <div class="title-row">
            <h1 id="detailsTitle">Character Details</h1>
            <span id="seasonBadge" class="season-badge">Season -</span>
            <button id="recommendButton" class="recommend-button" type="button" aria-pressed="false" aria-label="이 플레이어에게 따봉 날리기" title="이 플레이어에게 따봉 날리기">
              <span class="recommend-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z"></path>
                </svg>
              </span>
              <span id="recommendCount" class="recommend-count" aria-hidden="true">-</span>
            </button>
          </div>
          <p id="detailsMeta" class="meta-line">캐릭터 기록을 불러오는 중</p>
          <div class="hero-links">
            <a class="official-link" href="../">전체 랭킹</a>
            <a class="official-link" href="https://www.ff14.co.kr/ranking/CrystallineConflict" target="_blank" rel="noopener noreferrer">공식 랭킹 페이지</a>
          </div>
        </div>
        <div id="characterSummary" class="details-summary">
          <div class="details-stat-grid" aria-hidden="true">
            <div>
              <span class="skeleton-line skeleton-banner-label"></span>
              <strong><span class="skeleton-line skeleton-banner-value"></span></strong>
            </div>
            <div>
              <span class="skeleton-line skeleton-banner-label"></span>
              <strong><span class="skeleton-line skeleton-banner-value"></span></strong>
            </div>
            <div>
              <span class="skeleton-line skeleton-banner-label"></span>
              <strong><span class="skeleton-line skeleton-banner-value"></span></strong>
            </div>
            <div>
              <span class="skeleton-line skeleton-banner-label"></span>
              <strong><span class="skeleton-line skeleton-banner-value"></span></strong>
            </div>
            <div>
              <span class="skeleton-line skeleton-banner-label"></span>
              <strong><span class="skeleton-line skeleton-banner-value"></span></strong>
            </div>
            <div>
              <span class="skeleton-line skeleton-banner-label"></span>
              <strong><span class="skeleton-line skeleton-banner-value"></span></strong>
            </div>
          </div>
        </div>
      </header>

      <div class="details-dashboard">
        <section class="details-graph-panel" aria-label="순위 그래프">
          <div class="chart-container">
            <canvas id="rankChart"></canvas>
          </div>
        </section>

        <section class="panel details-history-panel">
          <div class="panel-head">
            <h2>스냅샷 기록</h2>
            <span id="historyCount">-</span>
          </div>
          <div class="details-history-wrap">
            <table>
              <thead>
                <tr>
                  <th>기준일</th>
                  <th>순위</th>
                  <th>티어</th>
                  <th>평점</th>
                  <th>승리</th>
                  <th>변동</th>
                </tr>
              </thead>
              <tbody id="historyRows"></tbody>
            </table>
          </div>
        </section>
      </div>
    </main>

    <footer class="site-footer" aria-label="제작자 정보">
      <span>FFXIV KR · PvP Archive · Made by <strong>Caitsith@모그리</strong></span>
      <a href="mailto:yeol@kstr.dev">yeol@kstr.dev</a>
    </footer>
  </div>

    <script src="../chart.umd.min.js"></script>
    <script src="../config.js?v=20260505-perfect-scrollbars"></script>
    <script src="details.js?v=20260509-wins-delta"></script>
  </body>
</html>
