<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FF14 CC Rankings</title>
    <link rel="stylesheet" href="styles.css?v=20260506-unified-fonts">
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-copy">
        <span class="eyebrow">FFXIV KR PvP Archive</span>
        <div class="title-row">
          <h1>Crystalline Conflict Rankings</h1>
          <span id="seasonBadge" class="season-badge">Season -</span>
        </div>
        <p class="meta-line">
          <span id="snapshotMeta">저장된 스냅샷을 불러오는 중</span>
          <span id="totalMeta">표시 인원 -</span>
          <span><a class="official-link" href="https://www.ff14.co.kr/ranking/CrystallineConflict" target="_blank" rel="noopener noreferrer">공식 랭킹 페이지</a></span>
        </p>
      </div>
      <div class="topbar-actions">
        <button id="projectHeart" class="heart-button" type="button" aria-pressed="false" aria-label="프로젝트가 마음에 들었다면 눌러주세요" title="프로젝트가 마음에 들었다면 눌러주세요">
          <span class="heart-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.08C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"></path>
            </svg>
          </span>
          <span class="heart-button-text">좋아요</span>
          <span id="projectHeartCount" class="heart-count" aria-hidden="true">-</span>
        </button>
        <button id="themeToggle" class="theme-toggle" type="button" aria-label="테마 변경" title="테마 변경">
          <span id="themeIcon" aria-hidden="true">☾</span>
        </button>
      </div>
    </header>

    <section class="snapshot-nav" aria-label="스냅샷 이동">
      <div class="snapshot-control" role="group" aria-label="스냅샷 기준 시점과 이동">
        <div class="snapshot-select-wrap">
          <span>기준 시점</span>
          <select id="snapshotSelect" aria-label="랭킹 기준 시점"></select>
        </div>
        <div class="snapshot-stepper" role="group" aria-label="이전/다음 스냅샷">
          <button id="prevSnapshot" class="nav-button" type="button">이전</button>
          <button id="nextSnapshot" class="nav-button" type="button">다음</button>
        </div>
      </div>
      <div class="ranking-search-tools">
        <input id="searchInput" type="search" placeholder="캐릭터 또는 서버 검색">
        <button id="filterToggle" class="filter-toggle" type="button" aria-expanded="false" aria-controls="rankingFilters" aria-label="필터 열기" title="필터 열기">
          <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
            <path d="M3 5h18l-6.8 7.7V18l-4.4 2.6v-7L3 5z"></path>
          </svg>
        </button>
        <div id="rankingFilters" class="ranking-filters" hidden>
          <label>
            <span>서버</span>
            <input id="serverFilterInput" type="text" inputmode="search" autocomplete="off" placeholder="예: 모그리">
          </label>
          <label>
            <span>닉네임</span>
            <input id="nameFilterInput" type="text" inputmode="search" autocomplete="off" placeholder="캐릭터명">
          </label>
          <label>
            <span>승수</span>
            <input id="winsFilterInput" type="number" inputmode="numeric" min="0" step="1" placeholder="최소">
          </label>
          <label>
            <span>최근</span>
            <input id="recentDaysInput" type="number" inputmode="numeric" min="1" step="1" placeholder="N일">
          </label>
          <button id="filterReset" class="filter-reset" type="button">초기화</button>
        </div>
      </div>
    </section>

    <section class="map-rotation" style="display: none;" aria-label="현재 맵 로테이션">
      <div>
        <span class="map-label">현재 맵</span>
        <strong id="currentMapName">불러오는 중</strong>
        <span id="currentMapTime">-</span>
      </div>
      <div>
        <span class="map-label">다음 맵</span>
        <strong id="nextMapName">-</strong>
        <span id="nextMapTime">-</span>
      </div>
      <a href="https://cc.shilin.net/" target="_blank" rel="noopener noreferrer">source</a>
    </section>

    <main class="layout">
      <div class="ranking-column">
        <section class="panel ranking-panel">
          <div class="panel-head">
            <h2>전체 랭킹</h2>
            <span id="entryCount"></span>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th class="sortable-th" data-sort-key="rank" tabindex="0" aria-sort="ascending">순위</th>
                  <th class="sortable-th" data-sort-key="character" tabindex="0">캐릭터</th>
                  <th class="sortable-th" data-sort-key="server" tabindex="0">서버</th>
                  <th class="sortable-th" data-sort-key="tier" tabindex="0">티어</th>
                  <th class="sortable-th" data-sort-key="points" tabindex="0">평점</th>
                  <th class="sortable-th" data-sort-key="wins" tabindex="0">승리</th>
                  <th class="sortable-th" data-sort-key="movement" tabindex="0">변동</th>
                </tr>
              </thead>
              <tbody id="rankingRows"></tbody>
            </table>
          </div>
        </section>
      </div>

      <aside class="panel detail-panel">
        <div class="panel-head">
          <h2>순위 그래프</h2>
          <span>rank graph</span>
        </div>
        <div id="selectedCharacter" class="selected"></div>
        <div class="chart-container">
          <canvas id="rankChart"></canvas>
        </div>
        <div id="seasonExtremes" class="season-extremes" aria-label="이번 시즌 최고 최저 기록"></div>
      </aside>
    </main>

    <footer class="site-footer" aria-label="제작자 정보">
      <span class="footer-label">Made by</span>
      <strong>Caitsith@모그리</strong>
      <a href="mailto:yeol@kstr.dev">yeol@kstr.dev</a>
    </footer>

    <script src="chart.umd.min.js"></script>
    <script src="config.js?v=20260505-perfect-scrollbars"></script>
    <script src="app.js?v=20260506-ranking-filters"></script>
  </body>
</html>
